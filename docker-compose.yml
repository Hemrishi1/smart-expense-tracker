version: '3.8'

services:
  client:
    build: 
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - expense-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/expense_tracker
      - JWT_SECRET=your_super_secret_jwt_key
      - JWT_EXPIRES_IN=1h
      - JWT_REFRESH_SECRET=your_super_secret_refresh_key
      - JWT_REFRESH_EXPIRES_IN=7d
    depends_on:
      - mongo
    networks:
      - expense-network
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - expense-network
    restart: unless-stopped

networks:
  expense-network:
    driver: bridge

volumes:
  mongo_data:
